<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Expert</title>
    <script>
        (function() {
            var saved = null;
            try { saved = localStorage.getItem('theme'); } catch (e) { saved = null; }
            var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            var theme = saved || (prefersLight ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"> Danil Afliatov </a>
            
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" data-i18n="nav_home"></a>
                    <a href="about.html" data-i18n="nav_about"></a>
                    <a href="clients.html" data-i18n="nav_clients"></a>
                    <a href="contact.html" data-i18n="nav_contact"></a>
                </div>
                
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                    <span class="theme-icon" id="theme-icon">☾</span>
                </button>
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="changeLang('en', event)">English</div>
                        <div onclick="changeLang('ru', event)">Русский</div>
                        <div onclick="changeLang('es', event)">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-container">
            <!-- ЛЕВАЯ ЧАСТЬ -->
            <div class="hero-left">
                <div class="hero-badge" data-i18n="hero_badge"></div>
                <h1 data-i18n="hero_title"></h1>
                <p data-i18n="hero_subtitle"></p>
                <div class="hero-buttons">
                    <a href="contact.html" class="btn primary" data-i18n="hero_contact_btn"></a>
                    <a href="clients.html" class="btn secondary" data-i18n="hero_clients_btn"></a>
                </div>
                <!-- МЕТРИКИ -->
                <div class="hero-stats">
                    <div>
                        <h3>7+</h3>
                        <p data-i18n="hero_stat_years"></p>
                    </div>
                    <div>
                        <h3>10+</h3>
                        <p data-i18n="hero_stat_projects"></p>
                    </div>
                    <div>
                        <h3>8+</h3>
                        <p data-i18n="hero_stat_teams"></p>
                    </div>
                </div>
            </div>
            
            <!-- ПРАВАЯ ЧАСТЬ -->
            <div class="hero-right">
                <div class="hero-image-wrapper">
                    <!-- Убедись, что картинка существует по этому пути -->
                    <img src="./assets/profile.jpg" alt="Danil Afliatov">
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <div class="footer-brand">
                <div class="footer-name">Danil Afliatov</div>
                <p class="footer-note" data-i18n="footer_tagline"></p>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_location_title"></h4>
                <div class="footer-location-item">
                    <span class="footer-flag">🇪🇺</span>
                    <span data-i18n="footer_location_eu"></span>
                </div>
                <div class="footer-location-item">
                    <span class="footer-flag">🇷🇺</span>
                    <span data-i18n="footer_location_ru"></span>
                </div>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_social_title"></h4>
                <a class="footer-link" href="#" aria-label="LinkedIn">LinkedIn</a>
                <a class="footer-link" href="#" aria-label="Telegram">Telegram</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-text">© <span data-footer-year></span> Danil Afliatov. <span data-i18n="footer_rights"></span></p>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/footer.js"></script>
</body>
</html>
