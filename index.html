<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Expert</title>
    <meta name="description" content="Danil Afliatov — Project Lead for HR and internal process transformation. Leading change from diagnosis to measurable results.">
    <link rel="canonical" href="https://dankzn.github.io/danil_afliatov/">
    <meta property="og:title" content="Danil Afliatov — Project Lead for HR & Internal Processes">
    <meta property="og:description" content="Leading HR and internal process transformation from diagnosis to measurable results.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dankzn.github.io/danil_afliatov/">
    <meta property="og:image" content="https://dankzn.github.io/danil_afliatov/assets/profile.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <script>
        (function() {
            var saved = null;
            try { saved = localStorage.getItem('theme'); } catch (e) { saved = null; }
            var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            var theme = saved || (prefersLight ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"> Danil Afliatov </a>
            
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" data-i18n="nav_home"></a>
                    <a href="about.html" data-i18n="nav_about"></a>
                    <a href="clients.html" data-i18n="nav_clients"></a>
                    <a href="contact.html" data-i18n="nav_contact"></a>
                </div>
                
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                    <span class="theme-icon" id="theme-icon">☾</span>
                </button>
                <button class="pride-toggle" id="pride-toggle" type="button" aria-label="Toggle Pride mode">
                    <span class="pride-toggle-flag" aria-hidden="true">🏳️‍🌈</span>
                </button>
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="changeLang('en', event)">English</div>
                        <div onclick="changeLang('ru', event)">Русский</div>
                        <div onclick="changeLang('es', event)">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-container">
            <!-- ЛЕВАЯ ЧАСТЬ -->
            <div class="hero-left">
                <div class="hero-badge" data-i18n="hero_badge"></div>
                <div class="hero-badge pride-only pride-badge" data-i18n="pride_badge"></div>
                <h1 data-i18n="hero_title"></h1>
                <p data-i18n="hero_subtitle"></p>
                <div class="hero-buttons">
                    <a href="contact.html" class="btn primary" data-i18n="hero_contact_btn"></a>
                    <a href="clients.html" class="btn secondary" data-i18n="hero_clients_btn"></a>
                </div>
                <!-- МЕТРИКИ -->
                <div class="hero-stats">
                    <div>
                        <h3>7+</h3>
                        <p data-i18n="hero_stat_years"></p>
                    </div>
                    <div>
                        <h3>10+</h3>
                        <p data-i18n="hero_stat_projects"></p>
                    </div>
                    <div>
                        <h3>8+</h3>
                        <p data-i18n="hero_stat_teams"></p>
                    </div>
                </div>
            </div>
            
            <!-- ПРАВАЯ ЧАСТЬ -->
            <div class="hero-right">
                <div class="hero-image-wrapper">
                    <!-- Убедись, что картинка существует по этому пути -->
                    <img src="./assets/profile.jpg" alt="Danil Afliatov" width="340" height="420" loading="eager">
                </div>
            </div>
        </div>
    </section>

    <section class="trust">
        <div class="container">
            <h2 data-i18n="home_trust_title"></h2>
            <p class="section-subtitle" data-i18n="home_trust_subtitle"></p>
            <div class="trust-logos">
                <img src="assets/clients/client-1-logo.png" alt="GMCS VerEx" loading="lazy" width="160" height="80">
                <img src="assets/clients/client-2-logo.png" alt="Bank of Kazan" loading="lazy" width="160" height="80">
                <img src="assets/clients/client-3-logo.png" alt="Ikon Tyres" loading="lazy" width="160" height="80">
            </div>
        </div>
    </section>

    <section class="value">
        <div class="container">
            <h2 data-i18n="home_value_title"></h2>
            <div class="value-grid">
                <div class="value-card">
                    <h3 data-i18n="home_value_1_title"></h3>
                    <p data-i18n="home_value_1_desc"></p>
                </div>
                <div class="value-card">
                    <h3 data-i18n="home_value_2_title"></h3>
                    <p data-i18n="home_value_2_desc"></p>
                </div>
                <div class="value-card">
                    <h3 data-i18n="home_value_3_title"></h3>
                    <p data-i18n="home_value_3_desc"></p>
                </div>
            </div>
        </div>
    </section>

    <section class="process">
        <div class="container">
            <h2 data-i18n="home_process_title"></h2>
            <div class="process-steps">
                <div class="process-step">
                    <span class="step-number">01</span>
                    <h3 data-i18n="home_process_1_title"></h3>
                    <p data-i18n="home_process_1_desc"></p>
                </div>
                <div class="process-step">
                    <span class="step-number">02</span>
                    <h3 data-i18n="home_process_2_title"></h3>
                    <p data-i18n="home_process_2_desc"></p>
                </div>
                <div class="process-step">
                    <span class="step-number">03</span>
                    <h3 data-i18n="home_process_3_title"></h3>
                    <p data-i18n="home_process_3_desc"></p>
                </div>
                <div class="process-step">
                    <span class="step-number">04</span>
                    <h3 data-i18n="home_process_4_title"></h3>
                    <p data-i18n="home_process_4_desc"></p>
                </div>
            </div>
        </div>
    </section>

    <section class="cta">
        <div class="container">
            <div class="cta-box">
                <h3 data-i18n="home_cta_title"></h3>
                <p data-i18n="home_cta_subtitle"></p>
                <a href="contact.html" class="btn primary" data-i18n="home_cta_button"></a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <div class="footer-brand">
                <div class="footer-name">Danil Afliatov</div>
                <p class="footer-note" data-i18n="footer_tagline"></p>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_location_title"></h4>
                <div class="footer-location-item">
                    <img class="footer-flag-img" src="https://upload.wikimedia.org/wikipedia/commons/b/b7/Flag_of_Europe.svg" alt="European Union flag" loading="lazy">
                    <span data-i18n="footer_location_eu"></span>
                </div>
                <div class="footer-location-item">
                    <img class="footer-flag-img" src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Flag_of_Russia.svg" alt="Flag of Russia" loading="lazy">
                    <span data-i18n="footer_location_ru"></span>
                </div>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_social_title"></h4>
                <a class="footer-link" href="#" aria-label="LinkedIn">LinkedIn</a>
                <a class="footer-link" href="#" aria-label="Telegram">Telegram</a>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_legal_title"></h4>
                <a class="footer-link button" href="privacy.html" data-i18n="footer_privacy"></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-text">© <span data-footer-year></span> Danil Afliatov. <span data-i18n="footer_rights"></span></p>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/pride.js"></script>
    <script src="assets/js/footer.js"></script>
</body>
</html>
