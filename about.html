<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <script>
        (function() {
            var saved = null;
            try { saved = localStorage.getItem('theme'); } catch (e) { saved = null; }
            var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            var theme = saved || (prefersLight ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"> Danil Afliatov </a>
            
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" data-i18n="nav_home"></a>
                    <a href="about.html" data-i18n="nav_about"></a>
                    <a href="clients.html" data-i18n="nav_clients"></a>
                    <a href="contact.html" data-i18n="nav_contact"></a>
                </div>
                
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                    <span class="theme-icon" id="theme-icon">☾</span>
                </button>
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="changeLang('en', event)">English</div>
                        <div onclick="changeLang('ru', event)">Русский</div>
                        <div onclick="changeLang('es', event)">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="container about-page">
        <h1 data-i18n="about_title"></h1>
        <div class="about-intro">
            <p data-i18n="about_intro_1"></p>
            <p data-i18n="about_intro_2"></p>
            <p data-i18n="about_intro_3"></p>
            <p data-i18n="about_intro_4"></p>
        </div>

        <h2 class="about-section-title" data-i18n="about_edu_title"></h2>
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_edu_1_period"></span>
                    <h3 data-i18n="about_edu_1_title"></h3>
                    <p data-i18n="about_edu_1_desc"></p>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_edu_2_period"></span>
                    <h3 data-i18n="about_edu_2_title"></h3>
                    <p data-i18n="about_edu_2_desc"></p>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_edu_3_period"></span>
                    <h3 data-i18n="about_edu_3_title"></h3>
                    <p data-i18n="about_edu_3_desc"></p>
                </div>
            </div>
        </div>

        <h2 class="about-section-title" data-i18n="about_additional_title"></h2>
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_add_1_period"></span>
                    <h3 data-i18n="about_add_1_title"></h3>
                    <p data-i18n="about_add_1_desc"></p>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_add_2_period"></span>
                    <h3 data-i18n="about_add_2_title"></h3>
                    <p data-i18n="about_add_2_desc"></p>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_add_3_period"></span>
                    <h3 data-i18n="about_add_3_title"></h3>
                    <p data-i18n="about_add_3_desc"></p>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_add_4_period"></span>
                    <h3 data-i18n="about_add_4_title"></h3>
                    <p data-i18n="about_add_4_desc"></p>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <span class="timeline-period" data-i18n="about_add_5_period"></span>
                    <h3 data-i18n="about_add_5_title"></h3>
                    <p data-i18n="about_add_5_desc"></p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <div class="footer-brand">
                <div class="footer-name">Danil Afliatov</div>
                <p class="footer-note" data-i18n="footer_tagline"></p>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_location_title"></h4>
                <p class="footer-text" data-i18n="footer_location_eu"></p>
                <p class="footer-text" data-i18n="footer_location_ru"></p>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_social_title"></h4>
                <a class="footer-link" href="#" aria-label="LinkedIn">LinkedIn</a>
                <a class="footer-link" href="#" aria-label="Telegram">Telegram</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-text">© <span data-footer-year></span> Danil Afliatov. <span data-i18n="footer_rights"></span></p>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/footer.js"></script>
</body>
</html>
