<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"> Danil Afliatov </a>
            
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" data-i18n="nav_home"></a>
                    <a href="about.html" data-i18n="nav_about"></a>
                    <a href="clients.html" data-i18n="nav_clients"></a>
                    <a href="contact.html" data-i18n="nav_contact"></a>
                </div>
                
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="changeLang('en', event)">English</div>
                        <div onclick="changeLang('ru', event)">Русский</div>
                        <div onclick="changeLang('es', event)">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="page-header">
        <div class="container">
            <h1 data-i18n="clients_title"></h1>
            <p data-i18n="clients_subtitle"></p>
        </div>
    </section>

    <section class="clients">
        <div class="container">
            <div class="clients-grid">
                <!-- Клиент 1 -->
                <div class="client-card">
                    <div class="client-logo">
                        <img src="./assets/clients/client-1-logo.png" alt="TechCorp" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="client-logo-fallback">TC</div>
                    </div>
                    <div class="client-content">
                        <h3>TechCorp International</h3>
                        <p class="client-request" data-i18n="client_1_request"></p>
                        <div class="client-tags">
                            <span>HR Strategy</span>
                            <span>Scaling</span>
                            <span>IT</span>
                        </div>
                        <a href="client-1.html" class="btn primary client-btn" data-i18n="client_view_case"></a>
                    </div>
                </div>

                <!-- Клиент 2 -->
                <div class="client-card">
                    <div class="client-logo">
                        <img src="./assets/clients/client-2-logo.png" alt="FinanceHub" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="client-logo-fallback">FH</div>
                    </div>
                    <div class="client-content">
                        <h3>FinanceHub Ltd</h3>
                        <p class="client-request" data-i18n="client_2_request"></p>
                        <div class="client-tags">
                            <span>Recruitment</span>
                            <span>Process</span>
                            <span>FinTech</span>
                        </div>
                        <a href="client-2.html" class="btn primary client-btn" data-i18n="client_view_case"></a>
                    </div>
                </div>

                <!-- Клиент 3 -->
                <div class="client-card">
                    <div class="client-logo">
                        <img src="./assets/clients/client-3-logo.png" alt="StartupX" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="client-logo-fallback">SX</div>
                    </div>
                    <div class="client-content">
                        <h3>StartupX</h3>
                        <p class="client-request" data-i18n="client_3_request"></p>
                        <div class="client-tags">
                            <span>Team Build</span>
                            <span>Culture</span>
                            <span>Startup</span>
                        </div>
                        <a href="client-3.html" class="btn primary client-btn" data-i18n="client_view_case"></a>
                    </div>
                </div>

                <!-- Клиент 4 -->
                <div class="client-card">
                    <div class="client-logo">
                        <img src="./assets/clients/client-4-logo.png" alt="GlobalSoft" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="client-logo-fallback">GS</div>
                    </div>
                    <div class="client-content">
                        <h3>GlobalSoft Solutions</h3>
                        <p class="client-request" data-i18n="client_4_request"></p>
                        <div class="client-tags">
                            <span>Agile</span>
                            <span>Transformation</span>
                            <span>Enterprise</span>
                        </div>
                        <a href="client-4.html" class="btn primary client-btn" data-i18n="client_view_case"></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/i18n.js"></script>
</body>
</html>
