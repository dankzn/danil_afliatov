<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <header>
        <nav>

            <div class="nav-right">

            <!-- Client 1 -->
<div class="client-card">

        <div class="client-logo-fallback" style="display: none;">TC</div>

</div>

<!-- Client 2 -->

</div>
            </div>
        </div>

    <script src="assets/js/i18n.js"></script>
