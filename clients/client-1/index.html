<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="../../index.html" class="logo">Danil Afliatov</a>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="../../index.html" data-i18n="nav_home">Home</a>
                    <a href="../../about.html" data-i18n="nav_about">About</a>
                    <a href="../../clients.html" data-i18n="nav_clients">Clients</a>
                    <a href="../../contact.html" data-i18n="nav_contact">Contact</a>
                </div>
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="switchLang('en')">English</div>
                        <div onclick="switchLang('ru')">Русский</div>
                        <div onclick="switchLang('es')">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="case-hero">
        <div class="container">
            <a href="../../clients.html" class="back-link">← <span data-i18n="back_to_clients">Back to Clients</span></a>
            <div class="case-header">
                <div class="case-logo">
                    <img id="client-logo" src="" alt="Client">
                    <div id="client-logo-fallback" class="client-logo-fallback large"></div>
                </div>
                <div class="case-info">
                    <h1 id="client-name"></h1>
                    <p class="case-duration" id="client-duration"></p>
                    <div class="case-tags" id="client-tags"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="case-content">
        <div class="container">
            <div class="case-section">
                <h2 data-i18n="case_challenge">The Challenge</h2>
                <p class="case-text" id="client-challenge"></p>
            </div>

            <div class="case-section">
                <h2 data-i18n="case_solution">The Solution</h2>
                <div class="solution-grid" id="client-solutions"></div>
            </div>

            <div class="case-section">
                <h2 data-i18n="case_results">Results</h2>
                <div class="results-grid" id="client-results"></div>
            </div>

            <div class="case-section">
                <div class="testimonial">
                    <p class="testimonial-text" id="client-testimonial"></p>
                    <div class="testimonial-author">
                        <div class="author-info">
                            <strong id="client-testimonial-author"></strong>
                            <span id="client-testimonial-position"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="case-cta">
                <h3 id="client-cta-title"></h3>
                <a href="../../contact.html" class="btn primary" data-i18n="case_cta_button">Let's Talk</a>
            </div>
        </div>
    </section>

    <script src="../../assets/js/i18n.js"></script>
    <script src="client.js"></script>
</body>
</html>
