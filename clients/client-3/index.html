<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study</title>
    <script>
        (function() {
            var saved = null;
            try { saved = localStorage.getItem('theme'); } catch (e) { saved = null; }
            var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            var theme = saved || (prefersLight ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="../../index.html" class="logo" aria-label="Aflyatov Danil">
                <img class="brand-logo brand-logo-main" src="../../assets/brand/logo_main_cropped.png" alt="Aflyatov Danil logo" loading="eager">
                <img class="brand-logo brand-logo-compact" src="../../assets/brand/logo_app_cropped.png" alt="AD logo" loading="eager">
                <img class="brand-logo brand-logo-compact-dark" src="../../assets/brand/logo_dark_cropped.png" alt="AD logo" loading="eager">
                <img class="brand-logo brand-logo-compact-pride" src="../../assets/brand/logo_pride_cropped.png" alt="AD pride logo" loading="eager">
            </a>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="../../index.html" data-i18n="nav_home">Home</a>
                    <a href="../../about.html" data-i18n="nav_about">About</a>
                    <a href="../../clients.html" data-i18n="nav_clients">Clients</a>
                    <a href="../../contact.html" data-i18n="nav_contact">Contact</a>
                </div>
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                    <span class="theme-icon" id="theme-icon">☾</span>
                </button>
                <button class="pride-toggle" id="pride-toggle" type="button" aria-label="Toggle Pride mode">
                    <span class="pride-toggle-flag" aria-hidden="true">🏳️‍🌈</span>
                </button>
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="switchLang('en')">English</div>
                        <div onclick="switchLang('ru')">Русский</div>
                        <div onclick="switchLang('es')">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="case-hero">
        <div class="container">
            <a href="../../clients.html" class="back-link">← <span data-i18n="back_to_clients">Back to Clients</span></a>
        </div>
    </section>

    <section class="case-main">
        <div class="container">
            <div class="case-layout">
                <!-- Левая колонка -->
                <aside class="case-sidebar">
                    <div class="case-logo-box">
                        <img id="client-logo" src="" alt="Client">
                        <div id="client-logo-fallback" class="client-logo-fallback large"></div>
                    </div>
                    
                    <div class="case-meta">
                        <div class="meta-item">
                            <span class="meta-label" data-i18n="meta_industry">Industry:</span>
                            <span class="meta-value" id="meta-industry">Manufacturing</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label" data-i18n="meta_solution">Solution:</span>
                            <span class="meta-value" id="meta-solution">Production Modernization</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label" data-i18n="meta_platform">Platform:</span>
                            <span class="meta-value" id="meta-platform">IBM Maximo</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label" data-i18n="meta_duration">Duration:</span>
                            <span class="meta-value" id="meta-duration">8 months • 2022</span>
                        </div>
                    </div>
                </aside>

                <!-- Правая колонка -->
                <div class="case-content">
                    <div class="case-header">
                        <h1 id="client-name"></h1>
                        <p class="case-subtitle" id="client-request"></p>
                    </div>

                    <div class="case-description">
                        <ul class="case-bullets">
                            <li id="client-challenge"></li>
                        </ul>
                    </div>

                    <div class="case-solutions" id="client-solutions">
                        <!-- Заполняется через JS -->
                    </div>

                    <div class="case-results">
                        <h2 data-i18n="case_results">Results</h2>
                        <div class="results-grid" id="client-results"></div>
                    </div>

                    <div class="case-testimonial" id="testimonial-section">
                        <h2 data-i18n="case_testimonial">Testimonial</h2>
                        <div class="testimonial-author" id="testimonial-author"></div>
                        <blockquote class="testimonial-text" id="client-testimonial"></blockquote>
                    </div>

                    <div class="case-cta">
                        <h3 id="client-cta-title"></h3>
                        <a href="../../contact.html" class="btn primary" data-i18n="case_cta_button">Let's Talk</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <div class="footer-brand">
                <div class="footer-name">Danil Afliatov</div>
                <p class="footer-note" data-i18n="footer_tagline"></p>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_location_title"></h4>
                <div class="footer-location-item">
                    <img class="footer-flag-img" src="https://upload.wikimedia.org/wikipedia/commons/b/b7/Flag_of_Europe.svg" alt="European Union flag" loading="lazy">
                    <span data-i18n="footer_location_eu"></span>
                </div>
                <div class="footer-location-item">
                    <img class="footer-flag-img" src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Flag_of_Russia.svg" alt="Flag of Russia" loading="lazy">
                    <span data-i18n="footer_location_ru"></span>
                </div>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_social_title"></h4>
                <a class="footer-link" href="#" aria-label="LinkedIn">LinkedIn</a>
                <a class="footer-link" href="#" aria-label="Telegram">Telegram</a>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_legal_title"></h4>
                <a class="footer-link button" href="../../privacy.html" data-i18n="footer_privacy"></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-text">© <span data-footer-year></span> Danil Afliatov. <span data-i18n="footer_rights"></span></p>
        </div>
    </footer>

    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script src="../../assets/js/pride.js"></script>
    <script src="../../assets/js/nav.js"></script>
    <script src="../../assets/js/footer.js"></script>
    <script src="client.js"></script>
</body>
</html>
