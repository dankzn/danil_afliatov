    <section class="contact">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2 data-i18n="contact_info_title">Contact Information</h2>
                    <p data-i18n="contact_info_text">I'm always open to discussing new opportunities.</p>

                <div class="contact-form-wrapper">
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label data-i18n="form_name">Your Name</label>

                        </div>
                        <div class="form-group">

                        </div>
                        <div class="form-group">
                            <label data-i18n="form_message">Your Message</label>
                            <textarea id="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn primary" data-i18n="form_submit">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // Инициализация EmailJS
        (function() {
            // ВСТАВЬ СВОЙ PUBLIC KEY НИЖЕ
            emailjs.init("SMd5PGpimWhcuzmz3");
        })();

        // Обработка формы
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            const templateParams = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                time: new Date().toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            // ВСТАВЬ СВОИ Service ID и Template ID НИЖЕ
            emailjs.send('service_tba8i5e', 'template_y8pw69u', templateParams)
                .then(function() {
                    alert('✅ Message sent successfully! I will get back to you soon.');
                    document.getElementById('contactForm').reset();
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }, function(error) {
                    alert('❌ Failed to send message. Please try again or email me directly.');
                    console.error('EmailJS Error:', error);
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                });
        });
    </script>
