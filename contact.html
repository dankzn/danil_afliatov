<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Danil Afliatov</a>
            
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" data-i18n="nav_home">Home</a>
                    <a href="about.html" data-i18n="nav_about">About</a>
                    <a href="clients.html" data-i18n="nav_clients">Clients</a>
                    <a href="contact.html" data-i18n="nav_contact">Contact</a>
                </div>
                
                <div class="lang-dropdown">
                    <button class="lang-btn" onclick="toggleLangMenu(event)">
                        <span id="current-lang">EN</span> ▾
                    </button>
                    <div class="lang-menu" id="lang-menu">
                        <div onclick="changeLang('en', event)">English</div>
                        <div onclick="changeLang('ru', event)">Русский</div>
                        <div onclick="changeLang('es', event)">Español</div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="page-header">
        <div class="container">
            <h1 data-i18n="contact_title">Get In Touch</h1>
            <p data-i18n="contact_subtitle">Let's discuss how I can help your team grow</p>
        </div>
    </section>

    <section class="contact">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2 data-i18n="contact_info_title">Contact Information</h2>
                    <p data-i18n="contact_info_text">I'm always open to discussing new opportunities.</p>
                    
                    <div class="contact-links">
                        <a href="mailto:daflyatov.kzn@gmail.com" class="contact-link">
                            <span class="icon">📧</span>
                            <span>daflyatov.kzn@gmail.com</span>
                        </a>
                    </div>
                </div>

                <div class="contact-form-wrapper">
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label data-i18n="form_name">Your Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="form_email">Your Email</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="form_message">Your Message</label>
                            <textarea id="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn primary" data-i18n="form_submit">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/i18n.js"></script>
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // Инициализация EmailJS
        (function() {
            // ВСТАВЬ СВОЙ PUBLIC KEY НИЖЕ
            emailjs.init("user_xxxxx");
        })();

        // Обработка формы
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            const templateParams = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                time: new Date().toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            // ВСТАВЬ СВОИ Service ID и Template ID НИЖЕ
            emailjs.send('SMd5PGpimWhcuzmz3', 'template_y8pw69u', templateParams)
                .then(function() {
                    alert('✅ Message sent successfully! I will get back to you soon.');
                    document.getElementById('contactForm').reset();
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }, function(error) {
                    alert('❌ Failed to send message. Please try again or email me directly.');
                    console.error('EmailJS Error:', error);
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
